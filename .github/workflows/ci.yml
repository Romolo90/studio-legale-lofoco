name: CI - Validate site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run validate:html || true   # non-blocking for now (many style warnings)

      - name: Run build (partials + minify if available)
        run: npm run build:html || echo "build:html not critical yet"

      - name: Check for broken internal links (basic)
        run: |
          echo "Basic link check (you can enhance with lychee or htmlproofer later)"
          grep -o 'href="[^"]*\.html"' *.html | head -5 || true

      - name: Summary
        run: echo "✅ Basic CI checks completed for Studio Legale Lo Foco site"
