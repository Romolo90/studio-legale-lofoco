name: CI - Validate site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run validate:html

      - name: Run production build
        run: npm run build

      - name: Check for broken internal links (basic)
        run: |
          echo "Basic link check (consider adding lychee or htmlproofer in future)"
          # Fail if any .html link points to non-existing file (simple check)
          for link in $(grep -o 'href="[^"]*\.html"' *.html | sed 's/href="//;s/"$//'); do
            if [ ! -f "$link" ] && [ "$link" != "index.html" ]; then
              echo "Broken link: $link"; exit 1;
            fi
          done
          echo "No obviously broken internal .html links found"

      - name: Summary
        run: echo "✅ CI checks passed for Studio Legale Lo Foco site (validate + full prod build + links)"
