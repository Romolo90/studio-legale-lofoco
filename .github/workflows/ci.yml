name: CI - Validate site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run validate:html

      - name: Run production build
        run: npm run build

      - name: Check for broken internal links (basic)
        run: |
          echo "Basic link check (consider adding lychee or htmlproofer in future)"
          # Robust extraction: -h suppresses "filename:" prefix from multi-file grep; only .html hrefs
          # Then clean: strip attrs, take up to # or ?, drop leading ./ or /
          broken=0
          while IFS= read -r raw || [ -n "$raw" ]; do
            # raw is the href value e.g. foo.html or https://.../bar.html or index.html#foo
            link=$(echo "$raw" | cut -d'#' -f1 | cut -d'?' -f1 | sed 's#^/##; s#^\./##')
            if [ -z "$link" ]; then continue; fi
            if [[ "$link" =~ ^https?:// ]] || [[ "$link" == "//"* ]] || [[ "$link" == javascript:* ]]; then
              continue
            fi
            if [ ! -f "$link" ]; then
              echo "Broken relative link: $link"
              broken=1
            fi
          done < <(grep -h -o 'href="[^"]*\.html[^"]*"' *.html | sed 's/href="//; s/".*//')
          if [ $broken -eq 1 ]; then
            echo "❌ Broken internal links found (see above). Fix hrefs or add missing files."
            exit 1
          fi
          echo "✅ No broken relative internal .html links found"

      - name: Summary
        run: echo "✅ CI checks passed for Studio Legale Lo Foco site (validate + full prod build + links)"
