name: CI - Validate site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run validate:html

      - name: Run production build
        run: npm run build

      - name: Check for broken internal links (basic)
        run: |
          echo "Basic link check (consider adding lychee or htmlproofer in future)"
          # Only check relative .html links (skip http/https absolute ones)
          broken=0
          for raw in $(grep -o 'href="[^"]*\.html[^"]*"' *.html | sed 's/href="//;s/".*//'); do
            link=$(echo "$raw" | cut -d'#' -f1)  # strip fragment
            if [[ "$link" =~ ^https?:// ]]; then
              continue
            fi
            if [ ! -f "$link" ] && [ "$link" != "index.html" ]; then
              echo "Broken relative link: $link"; broken=1;
            fi
          done
          if [ $broken -eq 1 ]; then exit 1; fi
          echo "No broken relative internal .html links found"

      - name: Summary
        run: echo "✅ CI checks passed for Studio Legale Lo Foco site (validate + full prod build + links)"
