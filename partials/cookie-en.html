<div id="cookie-banner" class="cookie-banner">
    <div class="cookie-content">
      <p>
        We use cookies and similar technologies to improve your browsing experience.
        For more information, see our
        <a href="cookie-policy-en.html" target="_blank" rel="noopener noreferrer">Cookie Policy</a>.
      </p>
    </div>
    <div class="cookie-buttons">
      <button type="button" id="accept-cookies" class="btn-cookie">Accept all</button>
      <button type="button" id="reject-cookies" class="btn-cookie btn-secondary">Reject</button>
      <button type="button" id="manage-cookies" class="btn-cookie btn-secondary">Manage cookies</button>
    </div>
  </div>

  <div id="cookie-preferences" class="hidden" role="dialog" aria-modal="true" aria-labelledby="cookie-prefs-title">
    <h2 id="cookie-prefs-title">Cookie Preferences</h2>
    <form>
      <label>
        <input type="checkbox" name="cookieType" value="analytical" />
        Analytical cookies (Google Analytics)
      </label>
      <button id="save-preferences" type="button">Save preferences</button>
      <button type="submit" style="display:none" aria-hidden="true"></button>
    </form>
  </div>
